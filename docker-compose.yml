version: "3.9"

services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  server:
    build: .
    ports:
      - "8123:8123"
    environment:
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8123
      - WHISPER_MODEL=base
      - WHISPER_COMPUTE_TYPE=int8
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=llama3.2
      - AUTH_TOKEN=${AUTH_TOKEN:-}
      - DEBUG=1
    depends_on:
      - ollama
    restart: unless-stopped

volumes:
  ollama_data:
