<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interview Assistant Overlay</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: #0f0f23;
  color: #e0e0e0;
  height: 100vh;
  overflow: hidden;
}
.header {
  background: rgba(0,0,0,0.4);
  border-bottom: 1px solid rgba(255,255,255,0.1);
  padding: 8px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 13px;
}
.header h1 { font-size: 14px; color: #00d4ff; font-weight: 600; }
.status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
.status-dot.connected { background: #00ff88; }
.status-dot.disconnected { background: #ff6b6b; }
.status-bar { display: flex; gap: 16px; align-items: center; font-size: 12px; color: #aaa; }
.main {
  display: grid;
  grid-template-columns: 2fr 3fr 2fr;
  height: calc(100vh - 40px);
  gap: 1px;
  background: rgba(255,255,255,0.05);
}
.panel {
  background: rgba(0,0,0,0.2);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.panel-header {
  background: rgba(0,0,0,0.3);
  padding: 8px 12px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
  font-size: 12px;
  font-weight: 600;
  color: #888;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.panel-content { flex: 1; overflow: hidden; position: relative; }

.transcript-log {
  height: 100%; overflow-y: auto; padding: 12px;
  font-size: 13px; line-height: 1.6;
}
.transcript-line {
  padding: 4px 8px; margin-bottom: 2px;
  border-left: 2px solid transparent;
  transition: all 0.3s;
}
.transcript-line.recent {
  border-left-color: #00d4ff;
  background: rgba(0,212,255,0.05);
  animation: fadeIn 0.5s ease;
}
.timestamp { color: #666; font-size: 11px; margin-right: 8px; }

.answer-detail {
  height: 100%; overflow-y: auto; padding: 16px;
  font-size: 14px; line-height: 1.7;
}
.answer-q {
  color: #00d4ff; font-weight: 600; margin-bottom: 12px;
  padding: 8px 12px; background: rgba(0,212,255,0.08);
  border-radius: 6px; border-left: 3px solid #00d4ff;
}
.answer-a { white-space: pre-wrap; word-wrap: break-word; }
.answer-pending { color: #ffd93d; font-style: italic; animation: blink 1.5s infinite; }

.qa-list { height: 100%; overflow-y: auto; }
.qa-row {
  display: grid;
  grid-template-columns: 70px 1fr 100px;
  padding: 8px 12px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  cursor: pointer;
  font-size: 12px;
  transition: all 0.2s;
}
.qa-row:hover { background: rgba(255,255,255,0.03); }
.qa-row.selected { background: rgba(0,212,255,0.12); border-left: 3px solid #00d4ff; }
.qa-status { font-size: 11px; font-weight: 600; }
.qa-status.pending { color: #ffd93d; }
.qa-status.answered { color: #00ff88; }
.qa-question {
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  padding-right: 8px;
}

.controls {
  position: fixed; bottom: 12px; right: 12px;
  display: flex; gap: 6px; z-index: 100;
}
.ctrl-btn {
  background: rgba(0,0,0,0.7); border: 1px solid rgba(255,255,255,0.15);
  color: #ccc; padding: 4px 10px; border-radius: 4px;
  cursor: pointer; font-size: 11px; font-family: inherit;
  transition: all 0.2s;
}
.ctrl-btn:hover { background: rgba(0,212,255,0.15); border-color: #00d4ff; color: #fff; }
.ctrl-btn.active { background: rgba(0,212,255,0.25); border-color: #00d4ff; color: #00d4ff; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
@keyframes blink { 0%,50% { opacity: 1; } 51%,100% { opacity: 0.4; } }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: rgba(255,255,255,0.03); }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }
</style>
</head>
<body>

<div class="header">
  <h1>Interview Assistant</h1>
  <div class="status-bar">
    <span><span id="ws-dot" class="status-dot disconnected"></span> <span id="ws-label">Disconnected</span></span>
    <span id="qa-count">Q&A: 0</span>
  </div>
</div>

<div class="main">
  <div class="panel">
    <div class="panel-header">Transcript</div>
    <div class="panel-content">
      <div id="transcript-log" class="transcript-log">
        <div class="transcript-line"><span class="timestamp">[--:--:--]</span>Waiting for audio...</div>
      </div>
    </div>
  </div>

  <div class="panel">
    <div class="panel-header">Answer</div>
    <div class="panel-content">
      <div id="answer-detail" class="answer-detail">
        <div style="text-align:center;color:#666;margin-top:40px;font-size:13px;">
          Select a question to view answer
        </div>
      </div>
    </div>
  </div>

  <div class="panel">
    <div class="panel-header">Questions</div>
    <div class="panel-content">
      <div id="qa-list" class="qa-list"></div>
    </div>
  </div>
</div>

<div class="controls">
  <button class="ctrl-btn" onclick="toggleFollow()" id="follow-btn">Follow</button>
  <button class="ctrl-btn" onclick="resetView()">Reset</button>
  <button class="ctrl-btn" onclick="saveSnapshot()">Export</button>
</div>

<script>
class InterviewOverlay {
  constructor() {
    this.ws = null;
    this.qas = [];
    this.selectedIdx = -1;
    this.follow = true;
    this.seenQ = new Set();
    this.pending = new Set();
    this.snapshotLines = [];
    this.connect();
    this.setupKeys();
  }

  setupKeys() {
    document.addEventListener('keydown', e => {
      if (e.target.tagName === 'INPUT') return;
      switch (e.key) {
        case 'f': this.toggleFollow(); break;
        case 'r': this.resetView(); break;
        case 's': this.saveSnapshot(); break;
        case 'j': this.selectNext(); break;
        case 'k': this.selectPrev(); break;
      }
    });
  }

  getParams() {
    const p = new URLSearchParams(window.location.search);
    return { ws: p.get('ws') || 'ws://localhost:8123/', token: p.get('token') || '' };
  }

  connect() {
    const params = this.getParams();
    this.wsUrl = params.ws;
    this.authToken = params.token;
    this.ws = new WebSocket(this.wsUrl);
    this.ws.onopen = () => {
      document.getElementById('ws-dot').className = 'status-dot connected';
      document.getElementById('ws-label').textContent = 'Connected to ' + this.wsUrl;
      if (this.authToken) {
        this.ws.send(JSON.stringify({ cmd: 'auth', token: this.authToken }));
      }
    };
    this.ws.onclose = () => {
      document.getElementById('ws-dot').className = 'status-dot disconnected';
      document.getElementById('ws-label').textContent = 'Disconnected';
      setTimeout(() => this.connect(), 3000);
    };
    this.ws.onmessage = e => {
      try { this.handle(JSON.parse(e.data)); } catch(ex) {}
    };
  }

  handle(data) {
    if (data.snapshot) this.loadSnapshot(data.snapshot);
    else if (data.line) this.addLine(data.line);
    else if (data.partial) this.addPartial(data.partial);
    else if (data.question_detected) this.addQuestion(data.question_detected);
    else if (data.qa) this.addAnswer(data.qa);
  }

  loadSnapshot(snap) {
    if (snap.lines) {
      this.snapshotLines = snap.lines;
      this.renderTranscript();
    }
    if (snap.detected) {
      this.qas = snap.detected.map(d => ({ q: d.q, a: d.a, t: d.t, pending: !d.a }));
      this.qas.forEach(qa => { if (qa.pending) this.pending.add(qa.q); });
      this.renderQA();
    }
  }

  addLine(line) {
    this.snapshotLines.push(line.text);
    const log = document.getElementById('transcript-log');
    const div = document.createElement('div');
    div.className = 'transcript-line recent';
    const ts = new Date();
    div.innerHTML = `<span class="timestamp">[${String(ts.getHours()).padStart(2,'0')}:${String(ts.getMinutes()).padStart(2,'0')}:${String(ts.getSeconds()).padStart(2,'0')}]</span>${line.text}`;
    log.appendChild(div);
    log.scrollTop = log.scrollHeight;
    setTimeout(() => div.classList.remove('recent'), 2000);
  }

  addPartial(text) {
    const log = document.getElementById('transcript-log');
    if (log.lastChild && log.lastChild.classList.contains('partial')) {
      log.lastChild.lastChild.textContent = text;
    } else {
      const div = document.createElement('div');
      div.className = 'transcript-line partial';
      div.innerHTML = `<span class="timestamp">[partial]</span><span>${text}</span>`;
      log.appendChild(div);
    }
    log.scrollTop = log.scrollHeight;
  }

  addQuestion(q) {
    if (!q.q || this.seenQ.has(q.q)) return;
    this.seenQ.add(q.q);
    const item = { q: q.q, a: null, t: q.t || Date.now(), pending: true };
    this.qas.push(item);
    this.pending.add(q.q);
    this.renderQAItem(item, this.qas.length - 1);
    this.updateCount();
    if (this.follow) this.select(this.qas.length - 1);
  }

  addAnswer(qa) {
    const item = this.qas.find(x => x.q === qa.q);
    if (!item) return;
    item.a = qa.a;
    item.pending = false;
    this.pending.delete(qa.q);
    this.renderQAItem(item, this.qas.indexOf(item));
    if (this.selectedIdx >= 0 && this.qas[this.selectedIdx] === item)
      this.renderAnswer(item);
    this.updateCount();
  }

  renderTranscript() {
    const log = document.getElementById('transcript-log');
    log.innerHTML = '';
    this.snapshotLines.forEach(line => {
      const div = document.createElement('div');
      div.className = 'transcript-line';
      const ts = new Date();
      div.innerHTML = `<span class="timestamp">[--:--:--]</span>${line}`;
      log.appendChild(div);
    });
    log.scrollTop = log.scrollHeight;
  }

  renderQA() {
    const list = document.getElementById('qa-list');
    list.innerHTML = '';
    this.qas.forEach((item, i) => this.renderQAItem(item, i));
  }

  renderQAItem(item, idx) {
    const list = document.getElementById('qa-list');
    let row = list.children[idx];
    if (!row) {
      row = document.createElement('div');
      row.className = 'qa-row';
      row.onclick = () => this.select(idx);
      list.appendChild(row);
    }
    const status = item.pending ? 'pending' : 'answered';
    const statusText = item.pending ? 'Generating...' : 'Answered';
    const preview = item.a ? item.a.slice(0, 50) + (item.a.length > 50 ? '...' : '') : '';
    row.innerHTML = `<div class="qa-status ${status}">${statusText}</div><div class="qa-question" title="${item.q}">${item.q}</div><div style="color:#888;font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${preview}</div>`;
    row.className = 'qa-row' + (idx === this.selectedIdx ? ' selected' : '');
  }

  select(idx) {
    if (idx < 0 || idx >= this.qas.length) return;
    this.selectedIdx = idx;
    document.querySelectorAll('.qa-row').forEach(r => r.classList.remove('selected'));
    const row = document.getElementById('qa-list').children[idx];
    if (row) { row.classList.add('selected'); row.scrollIntoView({ block: 'nearest' }); }
    this.renderAnswer(this.qas[idx]);
  }

  renderAnswer(item) {
    const detail = document.getElementById('answer-detail');
    if (!item) return;
    const aClass = item.pending ? 'answer-pending' : '';
    const content = item.a || 'Generating answer...';
    detail.innerHTML = `<div class="answer-q">${item.q}</div><div class="answer-a ${aClass}">${content}</div>`;
  }

  selectNext() { this.select(Math.min(this.selectedIdx + 1, this.qas.length - 1)); }
  selectPrev() { this.select(Math.max(this.selectedIdx - 1, 0)); }

  toggleFollow() {
    this.follow = !this.follow;
    document.getElementById('follow-btn').classList.toggle('active');
  }

  resetView() {
    this.qas = [];
    this.selectedIdx = -1;
    this.pending.clear();
    this.seenQ.clear();
    this.snapshotLines = [];
    document.getElementById('transcript-log').innerHTML = '<div class="transcript-line"><span class="timestamp">[--:--:--]</span>Waiting for audio...</div>';
    document.getElementById('qa-list').innerHTML = '';
    document.getElementById('answer-detail').innerHTML = '<div style="text-align:center;color:#666;margin-top:40px;font-size:13px;">Select a question to view answer</div>';
    if (this.ws && this.ws.readyState === WebSocket.OPEN)
      this.ws.send(JSON.stringify({ cmd: 'reset' }));
  }

  saveSnapshot() {
    const now = new Date().toISOString().replace(/[:.]/g, '-');
    const md = ['# Interview Assistant Report', `**Generated:** ${now}`, '',
      '## Transcript', '', ...this.snapshotLines.map(l => `- ${l}`), '',
      '## Questions & Answers', '',
      ...this.qas.map(qa => `### ${qa.q}\n\n${qa.a || '(pending)'}\n')];
    const blob = new Blob([md.join('\n')], { type: 'text/markdown' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `interview-report-${now}.md`;
    a.click();
    URL.revokeObjectURL(blob.href);
  }

  updateCount() {
    document.getElementById('qa-count').textContent = `Q&A: ${this.qas.length} (pending: ${this.pending.size})`;
  }
}

new InterviewOverlay();
</script>
</body>
</html>
